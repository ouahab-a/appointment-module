entity.agency.settings:
  path: '/admin/structure/agency'
  defaults:
    _form: '\Drupal\appointment\Form\AgencySettingsForm'
    _title: 'Agency'
  requirements:
    _permission: 'administer agency'

entity.appointment.settings:
  path: '/admin/structure/appointment'
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentSettingsForm'
    _title: 'Appointment'
  requirements:
    _permission: 'administer appointment'

appointment.export.csv:
  path: '/admin/structure/appointment/export-csv'
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentExportController::export'
    _title: 'Export CSV'
  requirements:
    _permission: 'administer appointment'

appointment_settings:
  path: '/admin/config/appointment/settings'
  defaults:
    _title: 'Paramètres des rendez-vous'
    _form: '\Drupal\appointment\Form\AppointmentSettingsForm'
  requirements:
    _permission: 'administer appointment configuration'

appointment.booking:
  path: '/prendre-un-rendez-vous'
  defaults:
    _title: 'Prendre un rendez-vous'
    _form: '\Drupal\appointment\Form\AppointmentBookingForm'
  requirements:
    _permission: 'access appointment booking'

appointment.modify:
  path: '/modifier-rendez-vous'
  defaults:
    _title: 'Modifier mon rendez-vous'
    _form: '\Drupal\appointment\Form\AppointmentModifyForm'
  requirements:
    _permission: 'access appointment booking'
