services:
  appointment.manager:
    class: Drupal\appointment\Service\AppointmentManager
    arguments:
      - '@entity_type.manager'
      - '@config.factory'

  appointment.email:
    class: Drupal\appointment\Service\EmailService
    arguments:
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@entity_type.manager'
      - '@logger.factory'
  appointment.uninstall:
    class: Drupal\appointment\Service\UninstallService
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@config.factory'
      - '@logger.factory'