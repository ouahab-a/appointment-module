services:
  appointment.manager:
    class: Drupal\appointment\Service\AppointmentManager
    arguments:
      - '@entity_type.manager'

  appointment.email:
    class: Drupal\appointment\Service\EmailService
    arguments:
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@entity_type.manager'

# Validateur de désinstallation — supprime le contenu auto
  appointment.uninstall_validator:
    class: Drupal\appointment\AppointmentUninstallValidator
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: module_install.uninstall_validator, priority: 100 }